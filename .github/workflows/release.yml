name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      DEVELOPMENT_TEAM: N7S7ZCZ5P7
      SIGN_IDENTITY: "Developer ID Application: Gurgen Abagyan (N7S7ZCZ5P7)"
      BUNDLE_ID: app.clipboard-history
      PROJECT_DIR: "Clipboard History"
      PROJECT_FILE: "Clipboard History.xcodeproj"
      SCHEME: "Clipboard History"
      APP_NAME: "Clipboard History"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version from tag
        id: version
        run: |
          REF_NAME="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'v0.0.0' }}}"
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"

          rm -f "$CERT_PATH"

      - name: Build Release
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            ENABLE_HARDENED_RUNTIME=YES \
            ENABLE_APP_SANDBOX=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            | tail -20

      - name: Re-sign Sparkle frameworks
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/$APP_NAME.app"
          SPARKLE="$APP_PATH/Contents/Frameworks/Sparkle.framework"

          if [ ! -d "$SPARKLE" ]; then
            echo "::warning::Sparkle.framework not found — skipping re-sign"
            exit 0
          fi

          sign_one() {
            codesign --force --options=runtime --timestamp \
              --sign "$SIGN_IDENTITY" "$1"
          }

          # Innermost first: XPC services
          for xpc in "$SPARKLE"/Versions/B/XPCServices/*.xpc; do
            [ -d "$xpc" ] || continue
            echo "  signing $(basename "$xpc")"
            sign_one "$xpc"
          done

          # Helper apps + bare executables next to the framework
          for helper in "$SPARKLE"/Versions/B/*.app "$SPARKLE"/Versions/B/Autoupdate; do
            [ -e "$helper" ] || continue
            echo "  signing $(basename "$helper")"
            sign_one "$helper"
          done

          # Sparkle framework itself
          echo "  signing Sparkle.framework"
          sign_one "$SPARKLE"

          # Re-seal the app bundle so its signature covers the new framework state
          echo "  re-sealing $APP_NAME.app"
          sign_one "$APP_PATH"

          echo "==> Verifying"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/$APP_NAME.app"
          ZIP_PATH="$RUNNER_TEMP/app.zip"
          KEY_DIR="$HOME/.private_keys"
          KEY_PATH="$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"

          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          set +e
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 30m \
            --output-format json)
          SUBMIT_EXIT=$?
          set -e

          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | /usr/bin/plutil -extract id raw -o - -- - 2>/dev/null || echo "")

          if [ -n "$SUBMISSION_ID" ]; then
            echo "::group::Notarization log for $SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" || true
            echo "::endgroup::"
          fi

          rm -f "$KEY_PATH" "$ZIP_PATH"

          if [ "$SUBMIT_EXIT" -ne 0 ]; then
            echo "✗ notarization failed — see log above"
            exit "$SUBMIT_EXIT"
          fi

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        id: dmg
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          DMG_NAME="ClipboardHistory-${{ steps.version.outputs.version }}.dmg"
          bash ../scripts/create-dmg.sh "build/Build/Products/Release/$APP_NAME.app" "$DMG_NAME"
          DMG_PATH="$(pwd)/$DMG_NAME"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign DMG with Sparkle EdDSA key
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -e

          # Sparkle ships as a binary XCFramework, so the tool lives under artifacts/
          # in modern Xcode. Search the whole SourcePackages tree to be safe.
          SIGN_TOOL=$(find "$PROJECT_DIR/build/SourcePackages" \
            -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -z "${SIGN_TOOL:-}" ]; then
            echo "::error::Sparkle's sign_update tool not found"
            echo "Searched in: $PROJECT_DIR/build/SourcePackages"
            find "$PROJECT_DIR/build/SourcePackages" -maxdepth 4 -type d 2>/dev/null | head -30
            exit 1
          fi
          echo "sign_update: $SIGN_TOOL"

          KEY_FILE="$RUNNER_TEMP/sparkle_ed_key"
          # printf '%s' avoids appending a trailing newline; strip CR/whitespace.
          printf '%s' "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' > "$KEY_FILE"
          KEY_LEN=$(wc -c < "$KEY_FILE" | tr -d ' ')
          echo "key file size: $KEY_LEN bytes"

          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG not found at $DMG_PATH"
            exit 1
          fi

          # Capture stdout AND stderr; show both in log.
          set +e
          SIGN_OUT=$("$SIGN_TOOL" -f "$KEY_FILE" "$DMG_PATH" 2>&1)
          SIGN_RC=$?
          set -e
          rm -f "$KEY_FILE"

          echo "::group::sign_update output (rc=$SIGN_RC)"
          echo "$SIGN_OUT"
          echo "::endgroup::"

          if [ "$SIGN_RC" -ne 0 ]; then
            echo "::error::sign_update failed with exit $SIGN_RC"
            exit "$SIGN_RC"
          fi

          # sign_update prints `sparkle:edSignature="..." length="..."` on stdout
          SIG_LINE="$SIGN_OUT"
          echo "signature_line=$SIG_LINE" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        env:
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          DMG_NAME: ${{ steps.dmg.outputs.dmg_name }}
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
          SIG_LINE: ${{ steps.sparkle.outputs.signature_line }}
        run: |
          set -e
          DOWNLOAD_URL="https://github.com/$GH_REPO/releases/download/$TAG/$DMG_NAME"
          PUB_DATE="$(date -u "+%a, %d %b %Y %H:%M:%S +0000")"
          MIN_OS="14.0"

          NEW_ITEM=$(cat <<XML
              <item>
                <title>Version $VERSION</title>
                <pubDate>$PUB_DATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>$MIN_OS</sparkle:minimumSystemVersion>
                <enclosure
                  url="$DOWNLOAD_URL"
                  type="application/octet-stream"
                  $SIG_LINE />
              </item>
          XML
          )

          if [ ! -f appcast.xml ]; then
            cat > appcast.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Clipboard History — Updates</title>
              <link>https://github.com/$GH_REPO</link>
              <description>Latest releases of Clipboard History.</description>
              <language>en</language>
          $NEW_ITEM
            </channel>
          </rss>
          XML
          else
            python3 - "$NEW_ITEM" <<'PY'
          import sys, pathlib, re
          new_item = sys.argv[1]
          path = pathlib.Path("appcast.xml")
          text = path.read_text()
          if "<item>" in text:
              text = text.replace("<item>", new_item.lstrip() + "\n        <item>", 1)
          else:
              text = text.replace("</channel>", new_item + "\n  </channel>", 1)
          path.write_text(text)
          PY
          fi

          echo "::group::appcast.xml"
          cat appcast.xml
          echo "::endgroup::"

      - name: Commit appcast.xml
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "appcast.xml unchanged"
          else
            git commit -m "release: ${{ steps.version.outputs.version }} appcast"
            # Push to default branch
            git push origin HEAD:main
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.dmg_path }}
          generate_release_notes: true
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
