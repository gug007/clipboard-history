      <header>
        <h1>Clipboard History for Mac — never lose what you copy</h1>
        <p>Clipboard History is a free clipboard manager for macOS. It remembers every text, link, image, and file you copy, so you can paste any of it back later. Press <strong>Shift + Command + V</strong> to open your clipboard history.</p>
        <p>
          <a href="https://github.com/gug007/clipboard-history/releases">Download free for Mac</a> ·
          <a href="https://github.com/gug007/clipboard-history">View on GitHub</a>
        </p>
        <p><em>Requires macOS 14 (Sonoma) or later. Apple Silicon and Intel Macs supported. Free and open source.</em></p>
      </header>

      <section aria-labelledby="ns-features-h">
        <h2 id="ns-features-h">What Clipboard History does</h2>
        <ul>
          <li>Recalls any text, link, image, or file you've ever copied on your Mac.</li>
          <li>Opens with one keyboard shortcut — Shift + Command + V by default.</li>
          <li>Works completely offline. Your clipboard history never leaves your computer.</li>
          <li>Automatically skips items copied from password managers (1Password, Bitwarden, Dashlane, KeePassXC, Apple Passwords, Keychain Access, LastPass).</li>
          <li>Pauses recording when you're typing into a password field.</li>
          <li>Lets you star and group your most-used clips.</li>
          <li>Free, open source, and ad-free.</li>
        </ul>
      </section>

      <section aria-labelledby="ns-faq-h">
        <h2 id="ns-faq-h">Frequently asked questions</h2>
        <h3>Is Clipboard History free?</h3>
        <p>Yes. Free, open source, no account, no trial, no ads. The code is on GitHub if you want to look at it.</p>
        <h3>Will it record my passwords?</h3>
        <p>No. The app skips anything copied from 1Password, Bitwarden, Dashlane, KeePassXC, Apple Passwords, Keychain Access, and LastPass. It also pauses recording when you're typing in a password field or sitting at the lock screen. You can add other apps to the skip list in Settings.</p>
        <h3>Which Macs does it work on?</h3>
        <p>Any Mac running macOS 14 (Sonoma) or newer. Apple Silicon and Intel both supported.</p>
        <h3>Will it slow down my Mac?</h3>
        <p>No. The app is about 6 MB and idle most of the time — it just listens for clipboard changes. Most people forget it's running.</p>
        <h3>How is this different from the built-in macOS clipboard?</h3>
        <p>macOS only remembers the last thing you copied. Copy something new and the previous one is gone. Clipboard History keeps the last 1,000 items by default (up to 10,000) so you can paste any of them back with Shift + Command + V.</p>
        <h3>How does it compare to Paste, Maccy, or Alfred's clipboard?</h3>
        <p>Honestly: it's free, open source, and tiny (~6 MB). Paste is paid and syncs across devices. Maccy is also free and open source — a great alternative if you prefer it. Alfred's clipboard comes bundled with the Powerpack. Clipboard History focuses on doing one thing well, with privacy as the default. If you need iCloud sync between Macs, pick something else.</p>
        <h3>Does it sync between my Macs?</h3>
        <p>No, and it won't. Your clipboard often contains passwords, private messages, and tokens — sending that to a server (even Apple's) is a tradeoff we don't want to make on your behalf. Clipboard History stays on the Mac it's installed on.</p>
        <h3>Where is my clipboard data stored?</h3>
        <p>In a single SQLite file on your Mac at <code>~/Library/Application Support/Clipboard History/clipboard.sqlite</code>. Nothing is uploaded anywhere. The file is usually a few hundred kilobytes since the app stores the location of large files and screenshots, not a copy.</p>
        <h3>How do I uninstall Clipboard History?</h3>
        <p>Quit the app from the menu bar, then drag Clipboard History from your Applications folder to the Trash. To remove your stored history too, delete the folder at <code>~/Library/Application Support/Clipboard History</code>.</p>
        <h3>What about screenshots and copied files?</h3>
        <p>Both are handled. For files you copy in Finder, the app stores the file's location, not a duplicate — so a 5 GB video costs a few kilobytes. Screenshots and images copied from the web are stored as images so you can paste them back into any app.</p>
        <h3>Why does it need Accessibility permission?</h3>
        <p>So it can paste for you when you press Return on a clip. macOS requires Accessibility access for any app to send keystrokes to another app. If you decline, the clip still lands on your clipboard and you can paste it manually with Command + V.</p>
        <h3>How do updates work?</h3>
        <p>The app is signed and notarized by Apple, so you won't see the scary "unidentified developer" warning. Updates are checked in the background and verified by Apple before they install. You can also check manually from the menu bar.</p>
